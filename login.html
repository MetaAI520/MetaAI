<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 农夫过河</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .auth-container { max-width: 400px; margin: 60px auto; padding: 0 16px; }
        .auth-card { background: var(--color-white); padding: 32px; border-radius: 12px; box-shadow: var(--shadow); }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 2px solid #eee; }
        .auth-tab.active { border-bottom-color: var(--color-primary); color: var(--color-primary); font-weight: bold; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: var(--radius); font-size: 1rem; }
        .form-error { color: var(--color-danger); font-size: 0.85rem; margin-top: 8px; display: none; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: var(--color-text-light); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" data-testid="login-tab" id="loginTab" role="tab" tabindex="0">登录</div>
                <div class="auth-tab" data-testid="register-tab" id="registerTab" role="tab" tabindex="0">注册</div>
            </div>
            <form id="authForm" data-testid="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" data-testid="username-input" required minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" data-testid="password-input" required minlength="8">
                </div>
                <div class="form-error" id="formError" data-testid="form-error"></div>
                <button type="submit" class="btn btn--primary" style="width:100%;padding:12px;" data-testid="auth-submit">登录</button>
            </form>
            <a href="game.html" class="back-link">返回游戏</a>
        </div>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let mode = new URLSearchParams(location.search).get('mode') || 'login';
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const submitBtn = document.querySelector('[data-testid="auth-submit"]');
        const errorEl = document.getElementById('formError');

        function setMode(m) {
            mode = m;
            loginTab.classList.toggle('active', m === 'login');
            registerTab.classList.toggle('active', m === 'register');
            submitBtn.textContent = m === 'login' ? '登录' : '注册';
            errorEl.style.display = 'none';
        }

        loginTab.onclick = () => setMode('login');
        registerTab.onclick = () => setMode('register');
        setMode(mode);

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            errorEl.style.display = 'none';

            try {
                if (mode === 'login') {
                    await ApiClient.login(username, password);
                } else {
                    await ApiClient.register(username, password);
                }
                window.location.href = 'game.html';
            } catch (err) {
                errorEl.textContent = err.error || '操作失败';
                errorEl.style.display = 'block';
            }
        };
    </script>
</body>
</html>
